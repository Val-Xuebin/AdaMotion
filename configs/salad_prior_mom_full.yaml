stage: action_prior
seed: 7
model:
  prior_type: text_length_action
  hidden_dim: 256
  latent_steps: 49
  clip_version: ViT-B/32
  max_text_tokens: 32
  dropout: 0.1
  lam_checkpoint: /workspace/AdaMotion/experiments/lam_mom_full/lam_best.pt
  official_salad_vae_opt: /workspace/assets/humanmodels/model_assets/salad/checkpoints/t2m/t2m_vae_gelu/opt.txt
  official_salad_vae_checkpoint: /workspace/assets/humanmodels/model_assets/salad/checkpoints/t2m/t2m_vae_gelu/model/net_best_fid.tar
data:
  val_split: val_usable
  dataset:
    data_root: /workspace/assets/dataset/HumanML3D
    split: train_usable
    max_motion_length: 196
    unit_length: 4
    min_motion_len: 40
    max_sequences:
    random_caption: true
train:
  device: cuda
  output_dir: /workspace/AdaMotion/experiments/salad_prior_mom_full
  batch_size: 64
  epochs: 100
  lr: 0.0003
  weight_decay: 0.000001
  num_workers: 4
