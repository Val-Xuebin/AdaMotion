stage: world_model
seed: 7
model:
  family: feature_mlp
  hidden_dim: 1024
  dropout: 0.1
  lam_checkpoint: /work/adamotion/experiments/paper/humanml_feature_mlp_lam_full/lam_best.pt
data:
  val_split: val
  dataset:
    data_root: /work/adamotion/data/HumanML3D
    representation: humanml_feature_vector
    split: train
    max_sequences:
    context_len: 6
    future_len: 1
    stride: 1
train:
  device: cuda
  output_dir: /work/adamotion/experiments/paper/humanml_feature_mlp_world_full
  batch_size: 512
  epochs: 50
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 0
