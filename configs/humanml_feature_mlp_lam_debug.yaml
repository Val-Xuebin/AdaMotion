stage: lam
seed: 7
model:
  family: feature_mlp
  hidden_dim: 1024
  latent_dim: 32
  beta: 0.001
  dropout: 0.1
data:
  val_split: val
  dataset:
    data_root: /work/adamotion/data/HumanML3D
    representation: humanml_feature_vector
    split: train
    num_frames: 2
    stride: 1
    max_sequences: 512
    max_transitions_per_sequence: 64
train:
  device: cuda
  output_dir: /work/adamotion/experiments/paper/humanml_feature_mlp_lam_debug
  batch_size: 512
  epochs: 5
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 4
