stage: lam
seed: 7
model:
  num_joints: 22
  joint_dim: 3
  model_dim: 128
  latent_dim: 32
  enc_blocks: 2
  dec_blocks: 2
  num_heads: 4
  beta: 0.001
  dropout: 0.0
data:
  val_split: val
  dataset:
    data_root: /work/adamotion/data/HumanML3D
    split: train
    num_frames: 8
    stride: 2
    max_sequences: 256
    max_transitions_per_sequence: 16
train:
  device: cuda
  output_dir: /work/adamotion/experiments/humanml_lam_debug
  batch_size: 128
  epochs: 2
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 0
