stage: lam
seed: 7
model:
  num_joints: 22
  joint_dim: 3
  model_dim: 256
  latent_dim: 32
  enc_blocks: 4
  dec_blocks: 4
  num_heads: 8
  beta: 0.001
  dropout: 0.1
data:
  val_split: val
  dataset:
    data_root: /work/adamotion/data/HumanML3D
    split: train
    num_frames: 8
    stride: 2
    max_sequences:
    max_transitions_per_sequence:
train:
  device: cuda
  output_dir: /work/adamotion/experiments/paper/humanml_joint_st_lam_full
  batch_size: 256
  epochs: 20
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 4
